global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    metrics_path: /metrics 
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: "auth_service"
    scheme: https
    metrics_path: /metrics
    tls_config:
      insecure_skip_verify: true
    static_configs:
      - targets: ["auth_service:3000"]