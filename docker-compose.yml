services:
  # frontend Service
  frontend:
    build: ./frontend
    container_name: frontend
    restart: always
    networks:
      - my-app-network
    volumes:
      - ./frontend:/app:Z
      - /app/node_modules

  # Nginx Service
  nginx:
    container_name: nginx
    build: ./backend/nginx
    restart: always
    ports:
      - "443:443"
    depends_on:
      - frontend
      - auth_service
      - chat_service
      - core_service
    networks:
      - my-app-network
    volumes:
      - uploads_data:/app/uploads:ro
  # Database
  postgres:
    container_name: postgres
    build: ./backend/database
    restart: always
    ports:
      - "5433:5432"
    networks:
      - my-app-network
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # # backend Services
  core_service:
    container_name: core_service
    build:
      context: backend
      dockerfile: Dockerfile
      args:
        - app_name=core
    restart: always
    env_file:
      - ./backend/auth/.env
    environment:
      - AUTH_SERVICE_URL=http://auth_service:3000
    depends_on:
      - auth_service
    networks:
      - my-app-network
  chat_service:
    container_name: chat_service
    build:
      context: backend
      dockerfile: Dockerfile
      args:
        - app_name=chat
    restart: always
    environment:
      - JWT_SECRET=super_secret_key
    depends_on:
      - auth_service
    networks:
      - my-app-network
  auth_service:
    container_name: auth_service
    build: backend/auth
    restart: always
    depends_on:
      - postgres
    networks:
      - my-app-network
    volumes:
      - uploads_data:/app/uploads

# Volumes
volumes:
  uploads_data:
  postgres_data:

    # Networks
networks:
  my-app-network:
    name: my-app-network
    driver: bridge
