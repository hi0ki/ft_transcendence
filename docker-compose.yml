services:
  # frontend Service
  frontend:
    build: ./frontend
    container_name: frontend
    restart: always
    networks:
      - my-app-network
    volumes:
      - ./frontend:/app:Z
      - /app/node_modules

  # Nginx Service
  nginx:
    container_name: nginx
    build: ./backend/nginx
    restart: always
    ports:
      - "443:443" 
      - "80:80"
    networks:
      - my-app-network
    volumes:
      - uploads_data:/app/uploads:ro
    depends_on:
      auth_service:
        condition: service_healthy
      chat_service:
        condition: service_healthy
      frontend:
        condition: service_started

  # Database
  postgres:
    container_name: postgres
    build: ./backend/database
    restart: always
    ports:
      - "5433:5432"
    networks:
      - my-app-network
    env_file:
      - ./backend/database/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ft_transc"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # # backend Services
  auth_service:
    container_name: auth_service
    build: backend/auth
    restart: always
    networks:
      - my-app-network
    env_file:
      - ./backend/auth/.env
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider --no-check-certificate https://localhost:3000/auth/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  core_service:
    container_name: core_service
    build:
      context: backend
      dockerfile: Dockerfile
      args:
        - app_name=core
    restart: always
    env_file:
      - ./backend/auth/.env
    environment:
      - AUTH_SERVICE_URL=https://auth_service:3000
    networks:
      - my-app-network
    depends_on:
      auth_service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -k -f https://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  chat_service:
    container_name: chat_service
    build:
      context: backend
      dockerfile: Dockerfile
      args:
        - app_name=chat
    restart: always
    env_file:
      - ./backend/auth/.env
    networks:
      - my-app-network
    depends_on:
      auth_service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -k -f https://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

# Volumes
volumes:
  uploads_data:
  postgres_data:

    # Networks
networks:
  my-app-network:
    name: my-app-network
    driver: bridge
